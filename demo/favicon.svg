<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 54 32">
  <!-- Background -->
  <rect width="54" height="32" rx="6" fill="#16213e"/>

  <!-- Tail -->
  <path d="M 8.5 16 Q 5 13.5 3.5 15.5 Q 4.5 18.5 8.5 17" fill="#8fcca0"/>

  <!-- Back legs -->
  <ellipse cx="12" cy="9.5"  rx="4.2" ry="2"   fill="#8fcca0" transform="rotate(-38 12 9.5)"/>
  <ellipse cx="12" cy="22.5" rx="4.2" ry="2"   fill="#8fcca0" transform="rotate( 38 12 22.5)"/>

  <!-- Front legs -->
  <ellipse cx="26" cy="9.5"  rx="4.2" ry="2"   fill="#8fcca0" transform="rotate( 38 26 9.5)"/>
  <ellipse cx="26" cy="22.5" rx="4.2" ry="2"   fill="#8fcca0" transform="rotate(-38 26 22.5)"/>

  <!-- Shell body -->
  <ellipse cx="19" cy="16" rx="11.5" ry="8.5" fill="#a8d8a0"/>

  <!-- Shell hexagonal pattern -->
  <path d="M19,8 L25,11.5 L25,20.5 L19,24 L13,20.5 L13,11.5 Z"
        fill="none" stroke="#4a90d9" stroke-width="0.7"/>
  <line x1="19" y1="8"  x2="19" y2="24"   stroke="#4a90d9" stroke-width="0.6"/>
  <line x1="7.5" y1="16" x2="30.5" y2="16" stroke="#4a90d9" stroke-width="0.6"/>
  <line x1="11" y1="10.5" x2="27" y2="21.5" stroke="#4a90d9" stroke-width="0.6"/>
  <line x1="27" y1="10.5" x2="11" y2="21.5" stroke="#4a90d9" stroke-width="0.6"/>

  <!-- Neck -->
  <ellipse cx="31.5" cy="16" rx="4" ry="3.2" fill="#a8d8a0"/>

  <!-- Head — pac-man facing right, mouth open ~30° above/below horizontal -->
  <!-- center=(37,15.5) r=6  mouthTop=(42.2,12.5)  mouthBottom=(42.2,18.5) -->
  <path d="M 37 15.5 L 42.2 12.5 A 6 6 0 1 0 42.2 18.5 Z" fill="#a8d8a0"/>

  <!-- Eye -->
  <circle cx="35.8" cy="11"  r="1.3" fill="#16213e"/>
  <circle cx="36.3" cy="10.5" r="0.45" fill="white" opacity="0.75"/>

  <!-- A* being eaten -->
  <text x="43" y="18.5"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="8" font-weight="bold" fill="#4a90d9">A*</text>
</svg>
